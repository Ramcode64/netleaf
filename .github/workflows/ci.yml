name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (API)
        run: npm run typecheck --workspace=apps/api

      - name: Run API tests
        run: npm test --workspace=apps/api
        env:
          LOCAL_MODE: "true"
          REDIS_URL: "redis://localhost:6379"

  api-build:
    name: API Build
    runs-on: ubuntu-latest
    needs: api-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace=apps/api

  web-build:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (Web)
        run: npm run typecheck --workspace=apps/web

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          AUTH_SECRET: "ci-build-placeholder-secret-000000000000"
          NEXT_PUBLIC_API_URL: "http://localhost:3000"
