version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - API_KEYS=${API_KEYS:-dev-key}
      - PORT=3000
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
